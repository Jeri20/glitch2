<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Intake Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background-color: #0a1014;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #fff;
    }

    .chat-wrapper {
      width: 100%;
      max-width: 420px;
      height: 90vh;
      max-height: 720px;
      background: #111b21;
      border-radius: 16px;
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.7);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      padding: 12px 16px;
      background: #202c33;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #1f2c33;
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00a884, #03c9a9);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 600;
    }

    .chat-header-text {
      display: flex;
      flex-direction: column;
    }

    .chat-header-title {
      font-size: 15px;
      font-weight: 600;
    }

    .chat-header-subtitle {
      font-size: 11px;
      color: #8696a0;
    }

    .messages {
      flex: 1;
      padding: 12px 10px;
      background-size: 340px 340px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .bubble-row {
      display: flex;
      width: 100%;
    }

    .bubble-row.user {
      justify-content: flex-end;
    }

    .bubble-row.bot {
      justify-content: flex-start;
    }

    .bubble {
      max-width: 80%;
      padding: 8px 10px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.35;
      position: relative;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .bubble.user {
      background: #005c4b;
      border-bottom-right-radius: 2px;
    }

    .bubble.bot {
      background: #202c33;
      border-bottom-left-radius: 2px;
    }

    .bubble-meta {
      display: block;
      font-size: 10px;
      color: #8696a0;
      margin-top: 4px;
      text-align: right;
    }

    .chat-input-area {
      padding: 8px 8px 10px;
      background: #202c33;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .chat-input {
      flex: 1;
      border-radius: 999px;
      border: none;
      padding: 9px 14px;
      font-size: 13px;
      outline: none;
      background: #2a3942;
      color: #e9edef;
    }

    .chat-input::placeholder {
      color: #707f88;
    }

    .send-button {
      border-radius: 50%;
      width: 34px;
      height: 34px;
      border: none;
      background: #00a884;
      color: #0a1014;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 17px;
      transition: background 0.15s ease;
    }

    .send-button:hover {
      background: #03c09b;
    }

    .status-bar {
      font-size: 11px;
      color: #8696a0;
      padding: 2px 12px 4px;
      background: #111b21;
      border-top: 1px solid #1f2c33;
    }
  </style>
</head>

<body>
  <div class="chat-wrapper">
    <div style="display:flex; gap:8px; padding:10px; background:#0f171c; border-bottom:1px solid #1f2c33;">
      <a href="/" style="flex:1; text-align:center; text-decoration:none; color:#0a1014; background:#00a884; padding:8px 10px; border-radius:999px; font-size:12px; font-weight:600;">Chat</a>
      <a href="/call-simulation" style="flex:1; text-align:center; text-decoration:none; color:#d8e0e5; background:#202c33; padding:8px 10px; border-radius:999px; font-size:12px; font-weight:600;">Call Simulation</a>
    </div>

    <div class="chat-header">
      <div class="avatar">B</div>
      <div class="chat-header-text">
        <div class="chat-header-title">Clinic Intake Bot</div>
        <div class="chat-header-subtitle">Online · WhatsApp-style demo</div>
      </div>
    </div>

    <div id="messages" class="messages"></div>

    <div class="status-bar" id="status-bar">Type a message to start…</div>

    <div class="chat-input-area">
      <input id="chat-input" class="chat-input" type="text"
        placeholder="Type your message (e.g. I have chest pain tomorrow morning)…" autocomplete="off" />
      <button id="send-button" class="send-button" title="Send">
        ➤
      </button>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("chat-input");
    const sendButtonEl = document.getElementById("send-button");
    const statusBarEl = document.getElementById("status-bar");

    function appendMessage(role, text, meta) {
      const row = document.createElement("div");
      row.className = "bubble-row " + role;

      const bubble = document.createElement("div");
      bubble.className = "bubble " + role;
      bubble.textContent = text;

      if (meta) {
        const metaEl = document.createElement("span");
        metaEl.className = "bubble-meta";
        metaEl.textContent = meta;
        bubble.appendChild(metaEl);
      }

      row.appendChild(bubble);
      messagesEl.appendChild(row);

      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function buildBotTextFromResponse(data) {
      // Prefer explicit reply_message (e.g. asking for missing info)
      const appt = data.appointment || {};
      const pieces = [];
      if (appt.booking_feedback) {
        pieces.push(appt.booking_feedback);
      } else if (appt.booking_success === true) {
        pieces.push("Slot booked.");
      } else if (appt.booking_success === false) {
        pieces.push("Slot not available.");
      }
      if (data.reply_message) {
        pieces.push(data.reply_message);
      }
      if (appt.name) {
        pieces.push(`Name: ${appt.name}`);
      }
      if (appt.preferred_time) {
        pieces.push(`Preferred time: ${appt.preferred_time}`);
      }
      if (appt.reason) {
        pieces.push(`Reason: ${appt.reason}`);
      }
      if (appt.location) {
        pieces.push(`Location: ${appt.location}`);
      }
      return pieces.length
        ? pieces.join("\n")
        : "Thanks, I have recorded your message.";
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      appendMessage("user", text);
      inputEl.value = "";
      statusBarEl.textContent = "Sending…";

      const payload = {
        from: "919999999999", // simulated phone number
        name: "Demo User",
        text,
        timestamp: String(Math.floor(Date.now() / 1000)),
        type: "text",
      };

      try {
        const res = await fetch("/webhook", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify(payload),
        });

        const data = await res.json();
        const botText = buildBotTextFromResponse(data);

        appendMessage("bot", botText);
        statusBarEl.textContent = "Online";
      } catch (err) {
        console.error(err);
        if (window.location.protocol === "file:") {
          appendMessage("bot", "🚨 ERROR: You opened this file directly from your computer (file://). You need to access it through the Flask server!\n\nPlease open your browser and type 'http://localhost:5000' in the address bar instead.");
        } else {
          appendMessage("bot", `Sorry, I couldn't connect to the server (Error: ${err.message}). Please ensure the Flask server is running in your terminal.`);
        }
        statusBarEl.textContent = "Error talking to server";
      }
    }

    sendButtonEl.addEventListener("click", sendMessage);
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        sendMessage();
      }
    });

    // Initial bot greeting
    appendMessage(
      "bot",
      "Hi, I’m the clinic intake assistant.\nTell me your name, location, symptoms, and when you want to visit."
    );
  </script>
</body>

</html>
