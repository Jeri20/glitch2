<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Call Simulation</title>
  <style>
    :root {
      --bg-0: #06090d;
      --bg-1: #0f141b;
      --bg-2: #16202a;
      --line: #22303d;
      --txt: #dce6ef;
      --muted: #8ea1b3;
      --green: #20c07d;
      --red: #e45555;
      --blue: #4a90e2;
      --amber: #dfad4d;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background:
        radial-gradient(1000px 500px at 20% 0%, #13202c 0%, transparent 60%),
        radial-gradient(900px 500px at 100% 100%, #102c22 0%, transparent 50%),
        var(--bg-0);
      color: var(--txt);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .phone {
      width: 100%;
      max-width: 920px;
      border: 1px solid var(--line);
      border-radius: 28px;
      overflow: hidden;
      background: linear-gradient(180deg, var(--bg-1), #0b1016);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.55);
    }

    .topnav {
      display: flex;
      gap: 10px;
      padding: 12px;
      border-bottom: 1px solid var(--line);
      background: #0c1218;
    }

    .topnav a {
      flex: 1;
      text-align: center;
      text-decoration: none;
      color: var(--txt);
      background: #1a2531;
      padding: 10px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
    }

    .topnav a.active {
      background: var(--green);
      color: #05110c;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      min-height: 76vh;
    }

    .left {
      border-right: 1px solid var(--line);
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
    }

    .avatar {
      width: 132px;
      height: 132px;
      border-radius: 50%;
      background: linear-gradient(145deg, #1f3e5a, #215148);
      border: 2px solid #2d4e68;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      font-weight: 700;
      position: relative;
    }

    .avatar.listening::after {
      content: "";
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 2px solid rgba(74, 144, 226, 0.6);
      animation: pulse 1s ease-out infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.9; }
      100% { transform: scale(1.25); opacity: 0; }
    }

    .title {
      margin-top: 14px;
      font-size: 22px;
      font-weight: 700;
      text-align: center;
    }

    .status {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
    }

    .timer {
      margin-top: 4px;
      font-size: 15px;
      color: #b5c3d0;
      letter-spacing: 1px;
    }

    .controls {
      display: flex;
      gap: 16px;
      margin-top: 20px;
    }

    .btn {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      color: white;
      transition: transform 0.15s ease;
    }

    .btn:hover { transform: translateY(-1px); }
    .btn.start { background: var(--green); color: #042012; }
    .btn.mic { background: var(--blue); }
    .btn.mic.stop { background: var(--amber); color: #291a00; }
    .btn.hang { background: var(--red); }

    .legend {
      margin-top: 14px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      min-height: 16px;
    }

    .right {
      padding: 14px;
      display: grid;
      grid-template-rows: 1fr 1fr 0.9fr;
      gap: 10px;
      background: #0a1016;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #101923;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .panel h3 {
      margin: 0;
      font-size: 13px;
      font-weight: 700;
      color: #a9bac8;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: #0d151e;
    }

    .panel .content {
      padding: 10px 12px;
      overflow: auto;
      white-space: pre-wrap;
      font-size: 13px;
      line-height: 1.45;
      color: #d7e2ec;
      flex: 1;
    }

    .statusline {
      font-size: 12px;
      color: var(--muted);
      padding: 8px 12px;
      border-top: 1px solid var(--line);
      background: #0d151e;
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }
      .left {
        border-right: none;
        border-bottom: 1px solid var(--line);
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  {% raw %}
  <script type="text/babel" data-presets="react">
    const { useEffect, useMemo, useRef, useState } = React;

    function formatSeconds(seconds) {
      const m = Math.floor(seconds / 60).toString().padStart(2, "0");
      const s = (seconds % 60).toString().padStart(2, "0");
      return `${m}:${s}`;
    }

    function CallSimulationApp() {
      const [connected, setConnected] = useState(false);
      const [recording, setRecording] = useState(false);
      const [processing, setProcessing] = useState(false);
      const [speaking, setSpeaking] = useState(false);
      const [callEnded, setCallEnded] = useState(false);
      const [seconds, setSeconds] = useState(0);

      const [transcript, setTranscript] = useState("");
      const [parsedJson, setParsedJson] = useState(null);
      const [aiResponse, setAiResponse] = useState("");
      const [systemStatus, setSystemStatus] = useState("Tap Start Call to begin.");

      const recognitionRef = useRef(null);
      const timerRef = useRef(null);

      const supportsSpeechRecognition = useMemo(() => {
        return Boolean(window.SpeechRecognition || window.webkitSpeechRecognition);
      }, []);

      useEffect(() => {
        return () => {
          clearInterval(timerRef.current);
          if (recognitionRef.current) recognitionRef.current.stop();
          window.speechSynthesis.cancel();
        };
      }, []);

      function startCall() {
        setConnected(true);
        setCallEnded(false);
        setSeconds(0);
        setTranscript("");
        setParsedJson(null);
        setAiResponse("");
        setSystemStatus("Call Connected");
        clearInterval(timerRef.current);
        timerRef.current = setInterval(() => {
          setSeconds((prev) => prev + 1);
        }, 1000);
      }

      function stopCall() {
        if (recognitionRef.current) recognitionRef.current.stop();
        setRecording(false);
        setConnected(false);
        setCallEnded(true);
        setSystemStatus("Call Ended");
        clearInterval(timerRef.current);
        window.speechSynthesis.cancel();
        setSpeaking(false);
      }

      function speakResponse(text) {
        if (!text) return;
        window.speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        utter.rate = 0.98;
        utter.pitch = 1;
        utter.onstart = () => {
          setSpeaking(true);
          setSystemStatus("AI speaking...");
        };
        utter.onend = () => {
          setSpeaking(false);
          if (connected) setSystemStatus("Call Connected");
        };
        window.speechSynthesis.speak(utter);
      }

      async function processTranscript(finalTranscript) {
        if (!finalTranscript.trim()) return;
        setProcessing(true);
        setSystemStatus("Parsing appointment details...");
        try {
          const response = await fetch("/api/call/process", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              caller_id: "+919999999999",
              transcript: finalTranscript,
            }),
          });
          const data = await response.json();
          setParsedJson(data.extractor_output || data.appointment || {});

          setSystemStatus("AI checking availability...");
          const replyText = data.ai_response || data.booking_feedback || "I have processed your request.";
          setAiResponse(replyText);
          speakResponse(replyText);
        } catch (err) {
          setAiResponse(`Error: ${err.message}`);
          setSystemStatus("Failed to process transcript.");
        } finally {
          setProcessing(false);
        }
      }

      function startListening() {
        if (!supportsSpeechRecognition) {
          setSystemStatus("Speech recognition is not supported in this browser.");
          return;
        }

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognitionRef.current = recognition;
        recognition.lang = "en-US";
        recognition.interimResults = true;
        recognition.continuous = true;

        recognition.onstart = () => {
          setRecording(true);
          setSystemStatus("AI listening...");
        };

        recognition.onresult = (event) => {
          let merged = "";
          for (let i = 0; i < event.results.length; i++) {
            merged += event.results[i][0].transcript + " ";
          }
          setTranscript(merged.trim());
        };

        recognition.onerror = () => {
          setRecording(false);
          setSystemStatus("Microphone error.");
        };

        recognition.onend = () => {
          setRecording(false);
          if (connected && !processing) setSystemStatus("Call Connected");
        };

        recognition.start();
      }

      function stopListeningAndProcess() {
        if (recognitionRef.current) recognitionRef.current.stop();
        setRecording(false);
        processTranscript(transcript);
      }

      return (
        <div className="phone">
          <div className="topnav">
            <a href="/">Chat</a>
            <a href="/call-simulation" className="active">Call Simulation</a>
          </div>

          <div className="layout">
            <section className="left">
              <div style={{ textAlign: "center" }}>
                <div className={`avatar ${recording ? "listening" : ""}`}>C</div>
                <div className="title">Clinic Intake Bot</div>
                <div className="status">{connected ? "Call Connected" : callEnded ? "Call Ended" : "Ready"}</div>
                <div className="timer">{formatSeconds(seconds)}</div>
              </div>

              <div>
                <div className="controls">
                  <button className="btn start" onClick={startCall} disabled={connected || processing}>Start</button>
                  <button
                    className={`btn mic ${recording ? "stop" : ""}`}
                    onClick={recording ? stopListeningAndProcess : startListening}
                    disabled={!connected || processing}
                  >
                    {recording ? "Stop" : "Mic"}
                  </button>
                  <button className="btn hang" onClick={stopCall} disabled={!connected && !callEnded}>Hang</button>
                </div>
                <div className="legend">
                  {!supportsSpeechRecognition
                    ? "Browser speech recognition is unavailable."
                    : recording
                    ? "Recording live speech..."
                    : "Press Mic to listen"}
                </div>
              </div>
            </section>

            <section className="right">
              <div className="panel">
                <h3>Live Transcript</h3>
                <div className="content">{transcript || "Speech transcript appears here."}</div>
                <div className="statusline">{recording ? "AI listening..." : "Idle"}</div>
              </div>

              <div className="panel">
                <h3>Parsed JSON Output</h3>
                <div className="content">
                  {parsedJson ? JSON.stringify(parsedJson, null, 2) : "No parsed output yet."}
                </div>
                <div className="statusline">{processing ? "Parsing appointment details..." : "Ready"}</div>
              </div>

              <div className="panel">
                <h3>AI Response</h3>
                <div className="content">{aiResponse || "Response from slot allocation will appear here."}</div>
                <div className="statusline">
                  {speaking ? "AI speaking..." : processing ? "AI checking availability..." : systemStatus}
                </div>
              </div>
            </section>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("app")).render(<CallSimulationApp />);
  </script>
  {% endraw %}

</body>
</html>
